<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#161423">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>renderMarkdown | utils.Syscall</title>
  <link rel="manifest" href="../../../manifest.json">
  <link rel="icon" href="../../../icons/icon.svg" type="image/svg+xml">
  
  <!-- Modular CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/markdown.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/prism.css">
  
  <!-- Prism.js bundled for syntax highlighting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  
  <style>
    /* Base styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--textPrimary);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    /* Top bar */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .logo {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .logo-render { color: var(--kwd); }
    .logo-dot { color: var(--num); }
    .logo-markdown { color: var(--fnc); }
    .logo-paren { color: var(--opr); }

    .top-bar-right { display: flex; align-items: center; gap: 8px; }

    .hamburger {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hamburger span {
      width: 20px;
      height: 2px;
      background: var(--textPrimary);
      border-radius: 2px;
      transition: all var(--transition);
    }

    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }

    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      display: flex;
    }

    .theme-toggle:hover { background: var(--border); }
    .theme-icon { width: 20px; height: 20px; }

    /* Menu dropdown */
    .menu-dropdown {
      position: fixed;
      top: 60px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      min-width: 180px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all var(--transition);
      z-index: 99;
    }

    .menu-dropdown.active { opacity: 1; visibility: visible; transform: translateY(0); }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      color: var(--textPrimary);
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
    }

    .menu-item:hover { background: var(--border); }
    .menu-item svg { width: 18px; height: 18px; color: var(--textSecondary); }

    /* Main content */
    .main-content {
      padding-top: 76px;
      padding-bottom: 40px;
      min-height: 100vh;
    }

    .editor-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px;
    }

    /* Mobile: Default preview, toggle to editor */
    @media (max-width: 767px) {
      .editor-container {
        position: relative;
        height: calc(100vh - 76px);
      }
      
      .editor-pane,
      .preview-pane {
        position: absolute;
        top: 16px;
        left: 16px;
        right: 16px;
        bottom: 16px;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      
      .editor-pane.active,
      .preview-pane.active {
        opacity: 1;
        visibility: visible;
      }
      
      .preview-pane.active {
        display: flex;
        flex-direction: column;
      }
      
      .editor-pane.active {
        display: flex;
        flex-direction: column;
      }
    }

    /* Desktop: Side by side - editor takes more space */
    @media (min-width: 768px) {
      .editor-container {
        flex-direction: row;
        gap: 20px;
        padding: 20px;
        height: calc(100vh - 76px);
      }
      
      .editor-pane {
        flex: 3;
        display: flex;
        flex-direction: column;
        min-height: 0;
        opacity: 1;
        visibility: visible;
      }
      
      .preview-pane {
        flex: 2;
        display: flex;
        flex-direction: column;
        min-height: 0;
        opacity: 1;
        visibility: visible;
      }
    }

    .pane { 
      display: flex; 
      flex-direction: column; 
      flex: 1;
    }

    .pane-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--textMuted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      padding: 0 4px;
    }

    .editor-wrapper {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .preview-pane .preview-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 32px;
      flex: 1;
      width: 100%;
      overflow-y: auto;
      min-height: 300px;
    }

    .editor:focus { outline: none; border-color: var(--kwd); }

    .file-input { display: none; }

    /* Mobile View Toggle Button */
    .view-toggle {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 56px;
      height: 56px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: all var(--transition);
    }

    .view-toggle:hover {
      transform: scale(1.1);
      border-color: var(--kwd);
    }

    .view-toggle svg {
      width: 24px;
      height: 24px;
      color: var(--textPrimary);
      margin: auto;
      display: block;
    }

    @media (max-width: 767px) {
      .view-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
      }
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.4s ease forwards; }

    /* Prism overrides for dark code blocks */
    pre[class*="language-"] {
      background: var(--bg);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <header class="top-bar">
    <div class="logo" id="logoToggle" role="button" aria-label="Toggle editor/preview">
      <span class="logo-render">render</span>
      <span class="logo-dot">.</span>
      <span class="logo-markdown">Markdown</span>
      <span class="logo-paren">();</span>
    </div>
    <div class="top-bar-right">
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <div class="theme-icon night"></div>
      </button>
    </div>
  </header>

  <!-- Menu dropdown -->
  <div class="menu-dropdown" id="menuDropdown">
    <button class="menu-item" id="importBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
      Import .md
    </button>
    <button class="menu-item" id="exportPdfBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
      </svg>
      Export as PDF
    </button>
    <button class="menu-item" id="exportHtmlBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
      Export as HTML
    </button>
  </div>

  <!-- Mobile View Toggle Button -->
  <button class="view-toggle" id="viewToggle" aria-label="Toggle editor/preview">
    <svg class="icon-preview" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
      <polyline points="14 2 14 8 20 8"></polyline>
      <line x1="16" y1="13" x2="8" y2="13"></line>
      <line x1="16" y1="17" x2="8" y2="17"></line>
      <polyline points="10 9 9 9 8 9"></polyline>
    </svg>
    <svg class="icon-editor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
    </svg>
  </button>

  <input type="file" id="fileInput" class="file-input" accept=".md,.markdown,.txt">

  <!-- Main content -->
  <main class="main-content">
    <div class="editor-container">
      <div class="pane editor-pane">
        <div class="pane-header">Markdown</div>
        <div class="editor-wrapper">
          <textarea id="markdownInput" class="editor-textarea" placeholder="# Hello World&#10;&#10;Write your markdown here..."></textarea>
          <div id="editorHighlight" class="editor-highlight"></div>
        </div>
      </div>
      <div class="pane preview-pane">
        <div class="pane-header">Preview</div>
        <div class="preview-content" id="previewOutput"></div>
      </div>
    </div>
  </main>

  <!-- Modular JS -->
  <script src="js/theme.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/math.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../../../sw.js').catch(function() {});
    }
  </script>
</body>
</html>
