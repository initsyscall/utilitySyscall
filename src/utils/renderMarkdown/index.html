<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>renderMarkdown | utils.Syscall</title>
  
  <!-- Modular CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/markdown.css">
  <link rel="stylesheet" href="css/prism.css">
  
  <!-- Prism.js bundled for syntax highlighting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  
  <style>
    /* Base styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--textPrimary);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    /* Top bar */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .logo {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .logo-render { color: var(--kwd); }
    .logo-dot { color: var(--num); }
    .logo-markdown { color: var(--fnc); }
    .logo-paren { color: var(--opr); }

    .top-bar-right { display: flex; align-items: center; gap: 8px; }

    .hamburger {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hamburger span {
      width: 20px;
      height: 2px;
      background: var(--textPrimary);
      border-radius: 2px;
      transition: all var(--transition);
    }

    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }

    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      display: flex;
    }

    .theme-toggle:hover { background: var(--border); }
    .theme-icon { width: 20px; height: 20px; }

    /* Menu dropdown */
    .menu-dropdown {
      position: fixed;
      top: 60px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      min-width: 180px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all var(--transition);
      z-index: 99;
    }

    .menu-dropdown.active { opacity: 1; visibility: visible; transform: translateY(0); }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      color: var(--textPrimary);
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
    }

    .menu-item:hover { background: var(--border); }
    .menu-item svg { width: 18px; height: 18px; color: var(--textSecondary); }

    /* Main content */
    .main-content {
      padding-top: 76px;
      padding-bottom: 40px;
      min-height: 100vh;
    }

    .editor-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px;
    }

    /* Mobile: Default preview, toggle to editor */
    @media (max-width: 767px) {
      .editor-container {
        position: relative;
        height: calc(100vh - 76px);
      }
      
      .editor-pane,
      .preview-pane {
        position: absolute;
        top: 16px;
        left: 16px;
        right: 16px;
        bottom: 16px;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      
      .editor-pane.active,
      .preview-pane.active {
        opacity: 1;
        visibility: visible;
      }
      
      .preview-pane.active {
        display: flex;
        flex-direction: column;
      }
      
      .editor-pane.active {
        display: flex;
        flex-direction: column;
      }
    }

    /* Desktop: Side by side - editor takes more space */
    @media (min-width: 768px) {
      .editor-container {
        flex-direction: row;
        gap: 20px;
        padding: 20px;
        height: calc(100vh - 76px);
      }
      
      .editor-pane {
        flex: 3;
        display: flex;
        flex-direction: column;
        min-height: 0;
        opacity: 1;
        visibility: visible;
      }
      
      .preview-pane {
        flex: 2;
        display: flex;
        flex-direction: column;
        min-height: 0;
        opacity: 1;
        visibility: visible;
      }
    }

    .pane { 
      display: flex; 
      flex-direction: column; 
      flex: 1;
    }

    .pane-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--textMuted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      padding: 0 4px;
    }

    .editor-pane textarea,
    .preview-pane .preview-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      color: var(--textPrimary);
      font-size: 14px;
      font-family: var(--font-mono);
      line-height: 1.6;
      resize: none;
      flex: 1;
      width: 100%;
      transition: border-color var(--transition);
    }

    .editor-pane textarea:focus { outline: none; border-color: var(--kwd); }

    .preview-pane .preview-content {
      overflow-y: auto;
      min-height: 300px;
    }

    .file-input { display: none; }

    /* Mobile View Toggle Button */
    .view-toggle {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 56px;
      height: 56px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: all var(--transition);
    }

    .view-toggle:hover {
      transform: scale(1.1);
      border-color: var(--kwd);
    }

    .view-toggle svg {
      width: 24px;
      height: 24px;
      color: var(--textPrimary);
      margin: auto;
      display: block;
    }

    @media (max-width: 767px) {
      .view-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
      }
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.4s ease forwards; }

    /* Prism overrides for dark code blocks */
    pre[class*="language-"] {
      background: var(--bg);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <header class="top-bar">
    <div class="logo" id="logoToggle" role="button" aria-label="Toggle editor/preview">
      <span class="logo-render">render</span>
      <span class="logo-dot">.</span>
      <span class="logo-markdown">Markdown</span>
      <span class="logo-paren">();</span>
    </div>
    <div class="top-bar-right">
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <div class="theme-icon night"></div>
      </button>
    </div>
  </header>

  <!-- Menu dropdown -->
  <div class="menu-dropdown" id="menuDropdown">
    <button class="menu-item" id="importBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
      Import .md
    </button>
    <button class="menu-item" id="exportPdfBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
      </svg>
      Export as PDF
    </button>
    <button class="menu-item" id="exportHtmlBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
      Export as HTML
    </button>
  </div>

  <!-- Mobile View Toggle Button -->
  <button class="view-toggle" id="viewToggle" aria-label="Toggle editor/preview">
    <svg class="icon-preview" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
      <polyline points="14 2 14 8 20 8"></polyline>
      <line x1="16" y1="13" x2="8" y2="13"></line>
      <line x1="16" y1="17" x2="8" y2="17"></line>
      <polyline points="10 9 9 9 8 9"></polyline>
    </svg>
    <svg class="icon-editor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
    </svg>
  </button>

  <input type="file" id="fileInput" class="file-input" accept=".md,.markdown,.txt">

  <!-- Main content -->
  <main class="main-content">
    <div class="editor-container">
      <div class="pane editor-pane">
        <div class="pane-header">Markdown</div>
        <textarea id="markdownInput" placeholder="# Hello World&#10;&#10;Write your markdown here..."></textarea>
      </div>
      <div class="pane preview-pane">
        <div class="pane-header">Preview</div>
        <div class="preview-content" id="previewOutput"></div>
      </div>
    </div>
  </main>

  <!-- Modular JS -->
  <script src="js/theme.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/math.js"></script>

  <script>
    // App module - orchestrates all modules
    const App = (function() {
      let currentTheme = 'nightSyscall';
      let mobileView = 'preview'; // 'preview' or 'editor' on mobile

      async function init() {
        // Initialize theme
        currentTheme = theme.initTheme();
        updateThemeIcon();
        
        // Initialize parser (loads marked.js)
        await parser.initParser();
        
        // Load default markdown
        loadDefaultMarkdown();
        
        // Setup event listeners
        setupEventListeners();
        
        // Initialize mobile view
        initMobileView();
        
        // Initialize KaTeX
        math.initKatex().then(() => {
          console.log('Math support ready');
          renderAll();
        });
        
        // Initial render
        renderAll();
      }

      function updateThemeIcon() {
        const icon = theme.getThemeIcon(currentTheme);
        document.querySelector('.theme-icon').innerHTML = icon;
        document.querySelector('.theme-icon').className = 
          'theme-icon ' + (currentTheme === 'nightSyscall' ? 'night' : 'day');
      }

      function toggleTheme() {
        currentTheme = currentTheme === 'nightSyscall' ? 'daySyscall' : 'nightSyscall';
        theme.setTheme(currentTheme);
        updateThemeIcon();
      }

      function toggleMobileView() {
        mobileView = mobileView === 'preview' ? 'editor' : 'preview';
        updateMobileView();
      }

      function updateMobileView() {
        const editorPane = document.querySelector('.editor-pane');
        const previewPane = document.querySelector('.preview-pane');
        const iconPreview = document.querySelector('.icon-preview');
        const iconEditor = document.querySelector('.icon-editor');
        
        if (mobileView === 'preview') {
          editorPane.classList.remove('active');
          previewPane.classList.add('active');
          iconPreview.style.display = 'none';
          iconEditor.style.display = 'block';
        } else {
          previewPane.classList.remove('active');
          editorPane.classList.add('active');
          iconPreview.style.display = 'block';
          iconEditor.style.display = 'none';
        }
      }

      function initMobileView() {
        // On mobile, default to preview
        if (window.innerWidth < 768) {
          mobileView = 'preview';
          updateMobileView();
        }
      }

      function renderAll() {
        parser.renderPreview('markdownInput', 'previewOutput');
        
        // Apply Prism highlighting
        setTimeout(() => {
          if (window.Prism) {
            Prism.highlightAllUnder(document.getElementById('previewOutput'));
          }
          // Render math
          math.processMathInElement('previewOutput');
        }, 50);
      }

      function loadDefaultMarkdown() {
        fetch('default.md')
          .then(res => res.text())
          .then(text => {
            document.getElementById('markdownInput').value = text;
            renderAll();
          })
          .catch(() => {
            // No default, use placeholder
          });
      }

      function importFile() {
        document.getElementById('fileInput').click();
      }

      function handleFileImport(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('markdownInput').value = e.target.result;
          renderAll();
          closeMenu();
        };
        reader.readAsText(file);
      }

      function exportAsPdf() {
        // Trigger Prism highlighting first
        if (window.Prism) {
          Prism.highlightAllUnder(document.getElementById('previewOutput'));
        }
        
        const preview = document.getElementById('previewOutput').cloneNode(true);
        
        // White background, dark text for print
        const printColors = {
          bg: '#ffffff',
          surface: '#f5f5f5',
          border: '#dddddd',
          textPrimary: '#1a1a1a',
          textSecondary: '#555555',
          textMuted: '#888888',
          kwd: '#752D7A',
          fnc: '#D62846',
          typ: '#9E4081',
          str: '#D96677',
          num: '#B06A3B',
          opr: '#0F828A'
        };
        
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
          <!DOCTYPE html>
          <html>
          <head>
            <title>Markdown Export</title>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              @media print {
                body { padding: 0 !important; }
              }
              body { 
                font-family: 'Segoe UI', system-ui, sans-serif; 
                background: ${printColors.bg}; 
                color: ${printColors.textPrimary}; 
                padding: 15mm; 
                max-width: 100%; 
                margin: 0 auto; 
                line-height: 1.5; 
                overflow-x: hidden;
              }
              h1 { 
                font-size: 1.8em; 
                border-bottom: 2px solid ${printColors.kwd}; 
                padding-bottom: 0.3em; 
                color: ${printColors.textPrimary}; 
                margin: 0 0 0.5em 0;
              }
              h2 { 
                font-size: 1.4em; 
                border-left: 4px solid ${printColors.typ}; 
                padding-left: 12px; 
                color: ${printColors.textPrimary}; 
                margin: 1.5em 0 0.5em 0;
              }
              h3 { font-size: 1.2em; color: ${printColors.fnc}; }
              h4 { color: ${printColors.str}; }
              p { margin: 0.8em 0; }
              code { 
                background: ${printColors.surface}; 
                color: ${printColors.fnc}; 
                padding: 2px 6px; 
                border-radius: 4px; 
                font-family: monospace;
                font-size: 0.9em;
              }
              pre { 
                background: ${printColors.surface}; 
                padding: 12px; 
                border-radius: 8px; 
                overflow-x: auto;
                margin: 0.8em 0;
              }
              pre code { 
                background: none; 
                padding: 0; 
                color: ${printColors.textPrimary}; 
                font-size: 0.85em;
                line-height: 1.5;
              }
              blockquote { 
                border-left: 4px solid ${printColors.kwd}; 
                background: ${printColors.surface}; 
                padding: 10px 16px; 
                color: ${printColors.textSecondary}; 
                border-radius: 0 8px 8px 0; 
                margin: 0.8em 0;
              }
              ul, ol { padding-left: 20px; margin: 0.8em 0; }
              li { margin: 0.3em 0; }
              a { color: ${printColors.kwd}; }
              table { 
                width: auto; 
                max-width: 100%;
                min-width: 50%;
                border-collapse: collapse; 
                margin: 0.8em 0; 
                border: 1px solid ${printColors.border};
                font-size: 0.85em;
                break-inside: avoid;
                page-break-inside: avoid;
                -webkit-region-break: avoid;
              }
              th, td { 
                border: 1px solid ${printColors.border}; 
                padding: 6px 12px;
                text-align: left;
                min-width: 80px;
              }
              th { 
                background: ${printColors.surface}; 
                color: ${printColors.kwd}; 
                font-weight: 600;
              }
              tr:nth-child(even) { background: ${printColors.surface}; }
              hr { 
                border: none; 
                border-top: 2px dashed ${printColors.border}; 
                margin: 1.5em 0; 
              }
              img { max-width: 100%; height: auto; }
              .katex-display { 
                background: ${printColors.surface}; 
                padding: 12px; 
                border-radius: 8px; 
                margin: 0.8em 0; 
                overflow-x: auto;
              }
              /* Syntax highlighting */
              .token.comment { color: ${printColors.textMuted}; font-style: italic; }
              .token.keyword { color: ${printColors.kwd}; }
              .token.string { color: ${printColors.str}; }
              .token.number { color: ${printColors.num}; }
              .token.function { color: ${printColors.fnc}; }
              .token.operator { color: ${printColors.opr}; }
              .token.class-name { color: ${printColors.typ}; }
              .token.punctuation { color: ${printColors.textSecondary}; }
              .token.property { color: ${printColors.num}; }
              .token.boolean { color: ${printColors.num}; }
              .token.attr-name { color: ${printColors.kwd}; }
              .token.attr-value { color: ${printColors.str}; }
              .token.selector { color: ${printColors.kwd}; }
              .token.tag { color: ${printColors.fnc}; }
              .token.atrule { color: ${printColors.kwd}; }
              .tokenbuiltin { color: ${printColors.fnc}; }
            </style>
          </head>
          <body>${preview.innerHTML}</body>
          </html>
        `);
        printWindow.document.close();
        setTimeout(() => printWindow.print(), 500);
        closeMenu();
      }

      function exportAsHtml() {
        const colors = theme.getThemeColors(currentTheme);
        
        // Trigger Prism highlighting first to get highlighted HTML
        if (window.Prism) {
          Prism.highlightAllUnder(document.getElementById('previewOutput'));
        }
        
        const previewHtml = document.getElementById('previewOutput').innerHTML;
        
        const htmlContent = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Export</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <style>
    :root {
      --bg: ${colors.bg};
      --surface: ${colors.surface};
      --border: ${colors.border};
      --textPrimary: ${colors.textPrimary};
      --textSecondary: ${colors.textSecondary};
      --textMuted: ${colors.textMuted};
      --kwd: ${colors.kwd};
      --fnc: ${colors.fnc};
      --typ: ${colors.typ};
      --str: ${colors.str};
      --num: ${colors.num};
      --opr: ${colors.opr};
    }
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--textPrimary); padding: 40px; max-width: 800px; margin: 0 auto; line-height: 1.6; }
    h1 { font-size: 2em; border-bottom: 2px solid var(--kwd); padding-bottom: 0.3em; }
    h2 { font-size: 1.5em; border-left: 4px solid var(--typ); padding-left: 12px; }
    h3 { font-size: 1.25em; color: var(--fnc); }
    p { margin: 1em 0; }
    code { background: var(--surface); color: var(--fnc); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
    pre { background: var(--surface); padding: 16px; border-radius: 8px; overflow-x: auto; margin: 1em 0; }
    pre code { background: none; padding: 0; color: var(--textPrimary); }
    blockquote { border-left: 4px solid var(--kwd); background: var(--surface); padding: 12px 16px; color: var(--textSecondary); border-radius: 0 8px 8px 0; }
    ul, ol { padding-left: 24px; }
    a { color: var(--kwd); }
    table { width: 100%; border-collapse: collapse; margin: 1em 0; }
    th, td { border: 1px solid var(--border); padding: 10px; }
    th { background: var(--surface); color: var(--kwd); }
    /* Override Prism colors with theme colors */
    .token.comment { color: var(--textMuted); }
    .token.keyword { color: var(--kwd); }
    .token.string { color: var(--str); }
    .token.number { color: var(--num); }
    .token.function { color: var(--fnc); }
    .token.operator { color: var(--opr); }
    .token.class-name { color: var(--typ); }
    .token.punctuation { color: var(--textSecondary); }
    .token.property { color: var(--num); }
    .token.boolean { color: var(--num); }
  </style>
</head>
<body>${previewHtml}</body>
</html>`;

        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'markdown-export.html';
        a.click();
        URL.revokeObjectURL(url);
        closeMenu();
      }

      function toggleMenu() {
        document.getElementById('hamburger').classList.toggle('active');
        document.getElementById('menuDropdown').classList.toggle('active');
      }

      function closeMenu() {
        document.getElementById('hamburger').classList.remove('active');
        document.getElementById('menuDropdown').classList.remove('active');
      }

      function setupEventListeners() {
        // Theme toggle
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        
        // Logo toggle (mobile only)
        document.getElementById('logoToggle').addEventListener('click', toggleMobileView);
        
        // View toggle button (mobile only)
        document.getElementById('viewToggle').addEventListener('click', toggleMobileView);
        
        // Menu toggle
        document.getElementById('hamburger').addEventListener('click', toggleMenu);
        
        // Menu items
        document.getElementById('importBtn').addEventListener('click', importFile);
        document.getElementById('exportPdfBtn').addEventListener('click', exportAsPdf);
        document.getElementById('exportHtmlBtn').addEventListener('click', exportAsHtml);
        
        // File input
        document.getElementById('fileInput').addEventListener('change', (e) => {
          if (e.target.files[0]) {
            handleFileImport(e.target.files[0]);
          }
        });
        
        // Markdown input
        document.getElementById('markdownInput').addEventListener('input', renderAll);
        
        // Click outside to close menu
        document.addEventListener('click', (e) => {
          if (!e.target.closest('.hamburger') && !e.target.closest('.menu-dropdown')) {
            closeMenu();
          }
        });

        // Re-render on theme change
        window.addEventListener('themechange', renderAll);
      }

      // Public API
      return { init, renderAll, toggleTheme };
    })();

    // Start app
    document.addEventListener('DOMContentLoaded', function() {
      App.init().catch(err => console.error('App init error:', err));
    });
  </script>
</body>
</html>
