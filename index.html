<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>utilitySyscall Dashboard</title>
  <style>
    :root {
      --bg: #161423;
      --surface: #201D33;
      --border: #322D4A;
      --textPrimary: #E0DEF4;
      --textSecondary: #908CAA;
      --textMuted: #6E6A86;
      --kwd: #A277FF;
      --fnc: #FF3366;
      --str: #F087BD;
      --num: #F6C177;
      --opr: #80FFEA;
      --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    :root[data-theme="daySyscall"] {
      --bg: #FCF6F5;
      --surface: #F2EAE9;
      --border: #E0D1CF;
      --textPrimary: #45383C;
      --textSecondary: #827075;
      --textMuted: #A8959A;
      --kwd: #752D7A;
      --fnc: #D62846;
      --str: #D96677;
      --num: #B06A3B;
      --opr: #0F828A;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--textPrimary);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
      overflow-x: hidden;
      margin: 0;
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
      backdrop-filter: blur(12px);
      transition: background var(--transition), border-color var(--transition);
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
    }

    .logo-utility { color: var(--kwd); }
    .logo-dot { color: var(--num); }
    .logo-syscall { color: var(--fnc); }
    .logo-paren { color: var(--opr); }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-container {
      position: relative;
    }

    .search-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      padding-left: 36px;
      color: var(--textPrimary);
      font-size: 14px;
      width: 160px;
      transition: all var(--transition);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--kwd);
      width: 200px;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--textMuted);
      pointer-events: none;
    }

    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
    }

    .theme-toggle:hover {
      background: var(--border);
    }

    .theme-icon {
      width: 24px;
      height: 24px;
    }

    .theme-icon svg {
      width: 100%;
      height: 100%;
    }

    .main-content {
      padding-top: 80px;
      padding-bottom: 40px;
      min-height: 100vh;
    }

    .hero-text {
      text-align: center;
      padding: 30px 16px;
      padding-top: 25vh;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 0.2s;
    }

    .hero-title {
      font-size: 42px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      letter-spacing: -1px;
    }

    .hero-title span {
      display: inline;
    }

    .hero-title .logo-utility { 
      color: var(--kwd); 
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    .hero-title .logo-dot { 
      color: var(--num); 
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    .hero-title .logo-syscall { 
      color: var(--fnc); 
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    .hero-title .logo-paren { 
      color: var(--opr); 
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }

    .hero-description {
      color: var(--textSecondary);
      font-size: 14px;
      margin-top: 12px;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 20px;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--textSecondary);
      text-decoration: none;
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all var(--transition);
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .social-link:hover {
      border-color: var(--kwd);
      color: var(--kwd);
    }

    .social-link img {
      width: 20px;
      height: 20px;
    }

    @media (min-width: 768px) {
      .hero-title {
        font-size: 56px;
      }
      .search-input {
        width: 200px;
      }
      .search-input:focus {
        width: 280px;
      }
    }

    .cards-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      padding: 20px 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    @media (min-width: 768px) {
      .cards-container {
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        padding: 24px;
      }
    }

    @media (min-width: 1024px) {
      .cards-container {
        max-width: 1100px;
      }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      animation: cardFadeIn 0.5s ease forwards;
      transition: all var(--transition), opacity 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--kwd), var(--fnc));
      opacity: 0;
      transition: opacity var(--transition);
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--kwd);
      box-shadow: 0 0 4px var(--kwd), 0 0 8px var(--fnc), 0 8px 20px -4px rgba(162, 119, 255, 0.2);
    }

    .card:hover::before {
      opacity: 1;
    }

    .cards-container:hover .card:not(:hover) {
      opacity: 0.4;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--textPrimary);
    }

    .card-description {
      font-size: 13px;
      color: var(--textSecondary);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 11px;
      padding: 4px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--textMuted);
      transition: all var(--transition);
    }

    .card:hover .tag {
      border-color: var(--kwd);
      color: var(--kwd);
    }

    .no-results {
      text-align: center;
      padding: 60px 16px;
      color: var(--textMuted);
      font-size: 14px;
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20%) translateY(10px); }
      to { opacity: 1; transform: translateY(-20%) translateY(0); }
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes sunRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes moonRotate {
      from { transform: rotate(-90deg); }
      to { transform: rotate(0deg); }
    }

    .theme-icon.day svg {
      animation: sunRotate 1s ease;
    }

    .theme-icon.night svg {
      animation: moonRotate 0.5s ease;
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <div class="logo">
      <span class="logo-utility">utility</span>
      <span class="logo-dot">.</span>
      <span class="logo-syscall">Syscall</span>
      <span class="logo-paren">();</span>
    </div>
    <div class="top-bar-right">
      <div class="search-container">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="M21 21l-4.35-4.35"></path>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search utilities...">
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <div class="theme-icon night">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </div>
      </button>
    </div>
  </header>

  <main class="main-content">
    <div class="hero-text">
      <h1 class="hero-title">
        <span class="logo-utility">utility</span><span class="logo-dot">.</span><span class="logo-syscall">Syscall</span><span class="logo-paren">();</span>
      </h1>
      <p class="hero-description">
      Suckless Web Utils. 
      </p>
      <p class="hero-description">
       No build steps. No dependencies. No subscriptions. 
      </p>
      <p class="hero-description">
      A lightweight toolkit for the web, built to replace bloated "SaaS" platforms with simple, local-first alternatives.
      </p>
      <div class="social-links">
        <a href="https://github.com/initSyscall" target="_blank" class="social-link">
          <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg" alt="GitHub">
          GitHub
        </a>
        <a href="https://codeberg.org/initSyscall" target="_blank" class="social-link">
          <img src="https://codeberg.org/Codeberg/Design/raw/branch/main/logo/icon/svg/codeberg-logo_icon_blue.svg" alt="Codeberg">
          Codeberg
        </a>
      </div>
    </div>
    <div class="cards-container" id="cardsContainer"></div>
    <div class="no-results" id="noResults">No utilities found matching your search.</div>
  </main>

  <script>
    const themeData = {
      nightSyscall: {
        colors: {
          bg: "#161423",
          surface: "#201D33",
          border: "#322D4A",
          textPrimary: "#E0DEF4",
          textSecondary: "#908CAA",
          textMuted: "#6E6A86",
          kwd: "#A277FF",
          fnc: "#FF3366",
          typ: "#CBA6F7",
          str: "#F087BD",
          num: "#F6C177",
          opr: "#80FFEA"
        }
      },
      daySyscall: {
        colors: {
          bg: "#FCF6F5",
          surface: "#F2EAE9",
          border: "#E0D1CF",
          textPrimary: "#45383C",
          textSecondary: "#827075",
          textMuted: "#A8959A",
          kwd: "#752D7A",
          fnc: "#D62846",
          typ: "#9E4081",
          str: "#D96677",
          num: "#B06A3B",
          opr: "#0F828A"
        }
      }
    };

    let currentTheme = 'nightSyscall';
    let utilities = [];

    function setTheme(theme) {
      currentTheme = theme;
      const root = document.documentElement;
      const colors = themeData[theme].colors;
      
      Object.entries(colors).forEach(([key, value]) => {
        root.style.setProperty(`--${key}`, value);
      });
      
      localStorage.setItem('theme', theme);
      
      const iconContainer = document.getElementById('themeToggle');
      iconContainer.innerHTML = theme === 'nightSyscall' 
        ? `<div class="theme-icon night"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></div>`
        : `<div class="theme-icon day"><svg viewBox="0 0 24 24" fill="none" stroke="#45383C" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></div>`;
    }

    function renderCards(data) {
      const container = document.getElementById('cardsContainer');
      const noResults = document.getElementById('noResults');
      
      if (data.length === 0) {
        container.innerHTML = '';
        noResults.style.display = 'block';
        return;
      }
      
      noResults.style.display = 'none';
      container.innerHTML = data.map((item, index) => `
        <article class="card" style="animation-delay: ${0.1 + index * 0.08}s" onclick="window.location.href='${item.filePath}'">
          <h2 class="card-title">${item.heading}</h2>
          <p class="card-description">${item.description}</p>
          <div class="card-tags">
            ${item.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
          </div>
        </article>
      `).join('');
    }

function filterCards(query) {
      const q = query.toLowerCase().trim();
      if (!q) {
        renderCards(utilities);
        setTimeout(() => {
          document.getElementById('cardsContainer').classList.add('visible');
        }, 800);
        return;
      }
      
      const filtered = utilities.filter(item => 
        item.heading.toLowerCase().includes(q) ||
        item.description.toLowerCase().includes(q) ||
        item.tags.some(tag => tag.toLowerCase().includes(q))
      );
      
      renderCards(filtered);
    }

    async function init() {
      const savedTheme = localStorage.getItem('theme') || 'nightSyscall';
      setTheme(savedTheme in themeData ? savedTheme : 'nightSyscall');
      
      try {
        const response = await fetch('src/index.json');
        utilities = await response.json();
      } catch (e) {
        console.error('Failed to load utilities:', e);
        utilities = [];
      }
      
      renderCards(utilities);
      
      document.getElementById('themeToggle').addEventListener('click', () => {
        setTheme(currentTheme === 'nightSyscall' ? 'daySyscall' : 'nightSyscall');
      });
      
      document.getElementById('searchInput').addEventListener('input', (e) => {
        filterCards(e.target.value);
      });
    }

    init();
  </script>
</body>
</html>
